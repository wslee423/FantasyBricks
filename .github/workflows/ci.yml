name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Flutter 설치
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: stable
          cache: true

      - name: 패키지 설치
        run: flutter pub get

      - name: 정적 분석 (경고 0개 기준)
        run: flutter analyze --fatal-infos

      - name: 단위 테스트
        run: flutter test

      - name: APK 빌드
        run: flutter build apk --debug
